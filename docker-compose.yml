services:
  app:
    build: .
    ports:
      - "30009:3000"
    environment:
      - PORT=3000
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
